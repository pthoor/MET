name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Harden runner egress
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            www.powershellgallery.com:443
            cdn.powershellgallery.com:443
            psg-prod-eastus.azureedge.net:443

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest -Path ./MET.psd1

      - name: Verify tag matches module version
        shell: pwsh
        run: |
          $manifestVersion = (Import-PowerShellDataFile ./MET.psd1).ModuleVersion
          $tagVersion = $env:GITHUB_REF_NAME -replace '^v', ''

          if ($manifestVersion -ne $tagVersion) {
            throw "Tag version '$tagVersion' does not match ModuleVersion '$manifestVersion' in MET.psd1."
          }

          Write-Host "Version match confirmed: $manifestVersion"

      - name: Lint
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Repository PSGallery -Scope CurrentUser -Force -AcceptLicense
          $paths = @('Public', 'Private', 'Checks', 'MET.psm1', 'MET.psd1')
          $results = $paths | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_ -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          }
          $blocking = @($results | Where-Object { $_.Severity -in @('Error', 'Warning') })
          if ($blocking.Count -gt 0) {
            $blocking | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
            throw "PSScriptAnalyzer found $($blocking.Count) issue(s)."
          }
          Write-Host 'PSScriptAnalyzer: clean'

      - name: Run tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.0 -Repository PSGallery -Scope CurrentUser -Force -AcceptLicense

          $unitConfig = New-PesterConfiguration
          $unitConfig.Run.Path = './Tests/Unit'
          $unitConfig.Run.PassThru = $true
          $unitConfig.Output.Verbosity = 'Detailed'
          $unitResult = Invoke-Pester -Configuration $unitConfig
          if ($unitResult.FailedCount -gt 0) {
            throw "Unit tests failed with $($unitResult.FailedCount) failed test(s)."
          }

          $integrationConfig = New-PesterConfiguration
          $integrationConfig.Run.Path = './Tests/Integration'
          $integrationConfig.Run.PassThru = $true
          $integrationConfig.Output.Verbosity = 'Detailed'
          $integrationResult = Invoke-Pester -Configuration $integrationConfig
          if ($integrationResult.FailedCount -gt 0) {
            throw "Integration tests failed with $($integrationResult.FailedCount) failed test(s)."
          }

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    environment: production
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Harden runner egress
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            uploads.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            api.nuget.org:443
            globalcdn.nuget.org:443
            www.powershellgallery.com:443
            cdn.powershellgallery.com:443
            psg-prod-eastus.azureedge.net:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            token.actions.githubusercontent.com:443

      - name: Stage and package module
        shell: pwsh
        run: |
          $version = (Import-PowerShellDataFile ./MET.psd1).ModuleVersion
          $stage = Join-Path $env:RUNNER_TEMP 'stage' 'MET'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -Path @('MET.psd1', 'MET.psm1', 'LICENSE') -Destination $stage
          Copy-Item -Path @('Public', 'Private', 'Checks') -Destination $stage -Recurse
          Compress-Archive -Path "$stage/*" -DestinationPath "met-$version.zip"
          Write-Host "Packaged met-$version.zip"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'met-*.zip'

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            throw 'PSGALLERY_API_KEY secret is not set.'
          }

          $stagingPath = Join-Path $env:RUNNER_TEMP 'stage' 'MET'
          Publish-Module -Path $stagingPath -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "GitHub release for tag ${{ github.ref_name }} already exists; skipping creation."
          else
            shopt -s nullglob
            artifacts=(met-*.zip)
            artifact="${artifacts[0]:-}"
            if [[ -z "$artifact" ]]; then
              echo "No packaged artifact matching met-*.zip was found."
              exit 1
            fi

            gh release create "${{ github.ref_name }}" \
              --title "MET ${{ github.ref_name }}" \
              --generate-notes \
              "$artifact"
          fi
