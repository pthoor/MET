name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            www.powershellgallery.com:443
            cdn.powershellgallery.com:443
            psg-prod-eastus.azureedge.net:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -MinimumVersion 1.21.0 -Force -AcceptLicense -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $paths   = @('Public', 'Private', 'Checks', 'MET.psm1', 'MET.psd1')
          $results = $paths | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_ -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          }

          if ($results) {
            $results | Sort-Object Severity, ScriptName, Line |
              Format-Table -AutoSize -Property Severity, RuleName, ScriptName, Line, Message
            $errorFindings = $results | Where-Object Severity -eq 'Error'
            Write-Host "PSScriptAnalyzer: $($results.Count) finding(s) — $($errorFindings.Count) error(s)"
            if ($errorFindings) { exit 1 }
          } else {
            Write-Host 'PSScriptAnalyzer: no issues found.'
          }

  test:
    name: Pester Tests + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    permissions:
      contents: read
      checks: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            www.powershellgallery.com:443
            cdn.powershellgallery.com:443
            psg-prod-eastus.azureedge.net:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Pester
        shell: pwsh
        run: Install-Module -Name Pester -MinimumVersion 5.0.0 -Force -AcceptLicense -Scope CurrentUser

      - name: Run unit tests with coverage
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './Tests/Unit'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults-Unit.xml'
          $config.TestResult.OutputFormat = 'JUnitXml'
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('./Public/*.ps1', './Private/*.ps1', './Checks/**/*.ps1')
          $config.CodeCoverage.OutputPath = 'coverage.xml'
          $config.CodeCoverage.OutputFormat = 'JaCoCo'
          $result = Invoke-Pester -Configuration $config
          if ($result.Result -ne 'Passed') { exit 1 }

      - name: Enforce coverage threshold (30 %)
        shell: pwsh
        run: |
          [xml]$cov = Get-Content coverage.xml
          $report        = $cov.report
          $methodCounter = $report.counter | Where-Object { $_.type -eq 'METHOD' }
          if ($methodCounter) {
            $methodCounter = $methodCounter | Select-Object -First 1
            $missed        = [int]$methodCounter.missed
            $covered       = [int]$methodCounter.covered
          }
          else {
            # Fall back to line coverage if method counters are absent.
            $lineCounter = $report.counter | Where-Object { $_.type -eq 'LINE' } | Select-Object -First 1
            $missed      = if ($lineCounter) { [int]$lineCounter.missed } else { 0 }
            $covered     = if ($lineCounter) { [int]$lineCounter.covered } else { 0 }
          }
          $pct = if (($covered + $missed) -gt 0) { [math]::Round(100 * $covered / ($covered + $missed), 1) } else { 0 }
          Write-Host "Coverage: $pct %"
          if ($pct -lt 30) {
            Write-Error "Coverage $pct % is below the 30 % threshold."
            exit 1
          }

      - name: Run integration tests (mocked — no live tenant required)
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './Tests/Integration'
          $config.Run.PassThru = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults-Integration.xml'
          $config.TestResult.OutputFormat = 'JUnitXml'
          $result = Invoke-Pester -Configuration $config
          if ($result.Result -ne 'Passed') { exit 1 }

      - name: Publish unit test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Pester Unit Tests
          path: TestResults-Unit.xml
          reporter: java-junit

      - name: Publish integration test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: always()
        with:
          name: Pester Integration Tests
          path: TestResults-Integration.xml
          reporter: java-junit

  credential-scan:
    name: Credential Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            trufflehog.org:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334 # v3.95.7
        with:
          path: ./
          extra_args: --results=verified,unknown
